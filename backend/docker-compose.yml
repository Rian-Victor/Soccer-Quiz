version: "3.8"

services:
  # SQL Server para auth-service e user-service (desenvolvimento local)
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: soccer-quiz-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd}
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      # Nota: O healthcheck usa a senha padrão. Se MSSQL_SA_PASSWORD for diferente, ajuste aqui
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -Q ''SELECT 1'' || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - soccer-quiz-network
    restart: unless-stopped

  # MongoDB para quiz-service
  mongodb:
    image: mongo:7
    container_name: soccer-quiz-mongodb
    environment:
      MONGO_INITDB_DATABASE: soccer_quiz
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soccer-quiz-network

  # User Service
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: soccer-quiz-user-service
    environment:
      PORT: 3000
      DEBUG: "true"
      # DATABASE_URL deve ser configurada no arquivo .env
      # Para desenvolvimento local (Docker): mssql+pyodbc://sa:${MSSQL_SA_PASSWORD}@mssql:1433/quizdb?driver=ODBC+Driver+18+for+SQL+Server&Encrypt=no
      # Para produção (Azure): mssql+pyodbc://admin-quiz:${MSSQL_ADMIN_PASSWORD}@soccer-quiz.database.windows.net:1433/quizdb?driver=ODBC+Driver+18+for+SQL+Server&Encrypt=yes&TrustServerCertificate=no&loginTimeout=30
      DATABASE_URL: ${USER_SERVICE_DATABASE_URL}
    ports:
      - "3001:3000"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - soccer-quiz-network
    restart: unless-stopped

  # Auth Service
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: soccer-quiz-auth-service
    environment:
      PORT: 3000
      DEBUG: "true"
      JWT_SECRET: ${JWT_SECRET:-default-secret-change-in-production}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      # DATABASE_URL deve ser configurada no arquivo .env
      # Para desenvolvimento local (Docker): mssql+pyodbc://sa:${MSSQL_SA_PASSWORD}@mssql:1433/quizdb?driver=ODBC+Driver+18+for+SQL+Server&Encrypt=no
      # Para produção (Azure): mssql+pyodbc://admin-quiz:${MSSQL_ADMIN_PASSWORD}@soccer-quiz.database.windows.net:1433/quizdb?driver=ODBC+Driver+18+for+SQL+Server&Encrypt=yes&TrustServerCertificate=no&loginTimeout=30
      DATABASE_URL: ${AUTH_SERVICE_DATABASE_URL}
      USER_SERVICE_URL: http://user-service:3000
    ports:
      - "3002:3000"
    depends_on:
      mssql:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - soccer-quiz-network
    restart: unless-stopped

  # Quiz Service
  quiz-service:
    build:
      context: ./quiz-service
      dockerfile: Dockerfile
    container_name: soccer-quiz-quiz-service
    environment:
      PORT: 3000
      DEBUG: "true"
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB: soccer_quiz
    ports:
      - "3003:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - soccer-quiz-network
    restart: unless-stopped

  # API Gateway
  api-gateway:
    build:
      context: ./api_gateway
      dockerfile: Dockerfile
    container_name: soccer-quiz-api-gateway
    environment:
      PORT: 3000
      DEBUG: "true"
      JWT_SECRET: ${JWT_SECRET:-default-secret-change-in-production}
      JWT_ALGORITHM: HS256
      AUTH_SERVICE_URL: http://auth-service:3000
      USER_SERVICE_URL: http://user-service:3000
      QUIZ_SERVICE_URL: http://quiz-service:3000
      CASBIN_MODEL_PATH: app/casbin/rbac_model.conf
      CASBIN_POLICY_PATH: app/casbin/policy.csv
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      quiz-service:
        condition: service_started
    networks:
      - soccer-quiz-network
    restart: unless-stopped

volumes:
  mongodb-data:
  mssql-data:

networks:
  soccer-quiz-network:
    driver: bridge
